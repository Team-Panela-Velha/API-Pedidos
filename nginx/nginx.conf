# ─────────────────────────────────────────────────────────────────────────────
# CR9 — NGINX como load balancer da API-Pedidos
#
# Como usar (a partir da raiz do projeto):
#
# 1. Gerar o JAR:
#       ./mvnw clean package -DskipTests
#
# 2. Subir 2 instâncias da API em portas diferentes:
#       java -jar target/api_pedidos-0.0.1-SNAPSHOT.jar --server.port=8080
#       java -jar target/api_pedidos-0.0.1-SNAPSHOT.jar --server.port=8081
#    (ajuste o nome do JAR conforme o gerado em target/)
#
# 3. Subir o NGINX apontando para este arquivo:
#       nginx -c "$(pwd)/nginx/nginx.conf"
#    (Windows: nginx -c C:\caminho\completo\nginx\nginx.conf)
#
# 4. Validar o balanceamento (round-robin). O header X-Upstream-Addr mostra
#    qual instância (8080 ou 8081) respondeu cada requisição:
#       curl -i http://localhost/products -H "Authorization: Bearer <SEU_TOKEN>"
#
# Observação: a maioria dos endpoints exige JWT. Use POST /auth/login para obter
# um token e passe no header Authorization nas chamadas de teste.
# ─────────────────────────────────────────────────────────────────────────────

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    upstream brademo_api {
        # Round-robin (padrão) entre as duas instâncias da API
        server localhost:8080;
        server localhost:8081;
    }

    server {
        listen 80;
        server_name localhost;

        location / {
            proxy_pass http://brademo_api;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Evidência de qual instância atendeu (para o relatório do CR9/CR10)
            add_header X-Upstream-Addr $upstream_addr always;
        }
    }
}
